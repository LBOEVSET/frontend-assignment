sonar.projectKey=frontend-assignment
sonar.projectName=Frontend Assignment
sonar.projectVersion=1.0

# Source
sonar.sources=src
sonar.exclusions=src/main.tsx,src/vite-env.d.ts,**/*.module.css,**/*.d.ts

# Tests
sonar.tests=src
sonar.test.inclusions=src/**/__tests__/**,src/**/*.test.ts,src/**/*.test.tsx

# Coverage (lcov generated by vitest --coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Test execution report (generated by Vitest JUnit reporter)
# Enables the "Tests" metric in SonarQube: counts passed / failed / skipped.
sonar.testExecutionReportPaths=test-results.xml

# Encoding
sonar.sourceEncoding=UTF-8

# Language
sonar.language=ts
