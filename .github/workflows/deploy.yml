name: Build & Deploy Frontend Assignment

on:
  push:
    branches: [dev]

env:
  PROJECT_ID: agentassistant-496719
  REGISTRY:   asia-southeast1-docker.pkg.dev/agentassistant-496719/assignment
  IMAGE:      frontend-assignment
  DEPLOY:     frontend-assignment
  NS:         assignment

jobs:
  # ── Job 1: Test + SonarQube scan ──────────────────────────────────────────
  test-and-scan:
    name: Test & SonarQube scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # SonarQube needs full history for blame annotations

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage
        # Fails the job if coverage drops below the thresholds defined in
        # vitest.config.ts (70% lines / functions / branches / statements)

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONARQUBE_URL }}

      - name: SonarQube Quality Gate check
        uses: SonarSource/sonarqube-quality-gate-action@v1.1.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONARQUBE_URL }}
        # Fails the build if the Quality Gate is RED (e.g. new bugs, new
        # vulnerabilities, or coverage on new code < 70%).
        # To fix: check SonarQube dashboard, resolve issues, re-push.

  # ── Job 2: Build & deploy (only when scan passes) ─────────────────────────
  build-and-deploy:
    name: Build, push & deploy
    runs-on: ubuntu-latest
    needs: test-and-scan   # gated: scan must pass first
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout service repo
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          project_id:                 ${{ secrets.GCP_PROJECT_ID }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER }}
          location:     ${{ secrets.GKE_ZONE }}
          project_id:   ${{ secrets.GCP_PROJECT_ID }}

      - name: Build & push Docker image
        run: |
          docker buildx build --platform linux/amd64 \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest \
            --push .

      - name: Deploy to GKE
        run: |
          kubectl set image deployment/${{ env.DEPLOY }} \
            ${{ env.IMAGE }}=${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }} \
            -n ${{ env.NS }}
          kubectl rollout status deployment/${{ env.DEPLOY }} \
            -n ${{ env.NS }} --timeout=120s
