name: Build & Deploy Frontend Assignment

on:
  push:
    branches: [dev]

env:
  PROJECT_ID: agentassistant-496719
  REGISTRY:   asia-southeast1-docker.pkg.dev/agentassistant-496719/assignment
  IMAGE:      frontend-assignment
  DEPLOY:     frontend-assignment
  NS:         assignment

jobs:
  build-and-deploy:
    name: Build, push & deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout service repo
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          project_id:                 ${{ secrets.GCP_PROJECT_ID }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER }}
          location:     ${{ secrets.GKE_ZONE }}
          project_id:   ${{ secrets.GCP_PROJECT_ID }}

      - name: Build & push Docker image
        run: |
          docker buildx build --platform linux/amd64 \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest \
            --push .

      - name: Deploy to GKE
        run: |
          kubectl set image deployment/${{ env.DEPLOY }} \
            ${{ env.IMAGE }}=${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }} \
            -n ${{ env.NS }}
          kubectl rollout status deployment/${{ env.DEPLOY }} \
            -n ${{ env.NS }} --timeout=120s
